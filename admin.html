<!DOCTYPE html>
<html lang="en" data-theme="onyx">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black Bird — Admin Dashboard</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* ── Design Tokens ── */
        :root, [data-theme="onyx"] {
            --bg:            #0b0b0b;
            --bg-soft:       #141414;
            --surface:       #171717;
            --accent:        #ffd633;
            --accent-hover:  #ffb800;
            --accent-light:  rgba(255, 214, 51, 0.10);
            --success:       #10B981;
            --warning:       #F59E0B;
            --danger:        #EF4444;
            --info:          #3B82F6;
            --text-main:     #fff8da;
            --text-muted:    #c8c0a3;
            --text-title:    #ffffff;
            --border:        rgba(255, 214, 51, 0.18);
            --glass:         rgba(255, 255, 255, 0.055);
            --glass-br:      rgba(255, 214, 51, 0.18);
            --shadow-sm:     0 1px 3px rgba(0,0,0,.4);
            --shadow-md:     0 10px 26px rgba(0,0,0,.22);
            --shadow-lg:     0 18px 54px rgba(0,0,0,.38);
            --radius:        16px;
            --radius-lg:     22px;
            --font-display:  'Space Grotesk', sans-serif;
            --font-body:     'Plus Jakarta Sans', sans-serif;
            --transition:    0.22s cubic-bezier(.4,0,.2,1);
            --bg-gradient:   radial-gradient(760px 480px at 8% -10%, rgba(255, 214, 51, 0.18), transparent 56%),
                             radial-gradient(600px 420px at 105% 8%, rgba(255, 184, 0, 0.12), transparent 58%),
                             linear-gradient(180deg, #0b0b0b, #101010 48%, #0b0b0b);
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            font-family: var(--font-body);
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-main);
            line-height: 1.6;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
        }

        a { text-decoration: none; color: inherit; }

        /* ── Admin Layout ── */
        .admin-header {
            background: var(--glass);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--glass-br);
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .admin-header-inner {
            max-width: 1440px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1.5rem;
        }

        .admin-logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .admin-logo-icon {
            width: 38px;
            height: 38px;
            background: linear-gradient(135deg, var(--accent), var(--accent-hover));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #111;
            font-size: 1.1rem;
            font-weight: 900;
        }

        .admin-logo h1 {
            font-family: var(--font-display);
            font-size: 1.35rem;
            font-weight: 800;
            color: var(--text-title);
            letter-spacing: -0.03em;
        }

        .admin-logo h1 span {
            color: var(--accent);
        }

        .admin-header-actions {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .admin-badge {
            background: var(--accent-light);
            border: 1px solid var(--glass-br);
            color: var(--accent);
            font-size: 0.78rem;
            font-weight: 700;
            padding: 0.35rem 0.85rem;
            border-radius: 20px;
            letter-spacing: 0.3px;
            text-transform: uppercase;
        }

        .back-link {
            color: var(--text-muted);
            font-size: 0.88rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            transition: color var(--transition);
        }

        .back-link:hover { color: var(--accent); }

        /* ── Main Container ── */
        .admin-main {
            max-width: 1440px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* ── Stats Cards ── */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.25rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--glass);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid var(--glass-br);
            border-radius: var(--radius);
            padding: 1.5rem;
            transition: transform var(--transition), border-color var(--transition);
        }

        .stat-card:hover {
            transform: translateY(-2px);
            border-color: var(--accent);
        }

        .stat-card-label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.82rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.75rem;
        }

        .stat-card-label .stat-icon {
            width: 32px;
            height: 32px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
        }

        .stat-icon.orders { background: rgba(59,130,246,.15); }
        .stat-icon.pending { background: rgba(245,158,11,.15); }
        .stat-icon.confirmed { background: rgba(16,185,129,.15); }
        .stat-icon.revenue { background: rgba(255,214,51,.15); }

        .stat-card-value {
            font-family: var(--font-display);
            font-size: 2rem;
            font-weight: 800;
            color: var(--text-title);
            line-height: 1.1;
        }

        .stat-card-sub {
            font-size: 0.78rem;
            color: var(--text-muted);
            margin-top: 0.25rem;
        }

        /* ── Toolbar ── */
        .admin-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
        }

        .admin-toolbar h2 {
            font-family: var(--font-display);
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            color: var(--text-title);
        }

        .toolbar-actions {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .admin-search {
            position: relative;
        }

        .admin-search input {
            background: var(--glass);
            border: 1px solid var(--glass-br);
            border-radius: 12px;
            padding: 0.65rem 1rem 0.65rem 2.5rem;
            color: var(--text-main);
            font-family: var(--font-body);
            font-size: 0.9rem;
            width: 280px;
            outline: none;
            transition: border-color var(--transition), box-shadow var(--transition);
        }

        .admin-search input::placeholder { color: var(--text-muted); }

        .admin-search input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-light);
        }

        .admin-search .search-icon {
            position: absolute;
            left: 0.85rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 0.95rem;
            pointer-events: none;
        }

        .filter-select {
            background: var(--glass);
            border: 1px solid var(--glass-br);
            border-radius: 12px;
            padding: 0.65rem 1rem;
            color: var(--text-main);
            font-family: var(--font-body);
            font-size: 0.88rem;
            cursor: pointer;
            outline: none;
            transition: border-color var(--transition);
        }

        .filter-select:focus { border-color: var(--accent); }

        .filter-select option {
            background: var(--bg-soft);
            color: var(--text-main);
        }

        .refresh-btn {
            background: var(--glass);
            border: 1px solid var(--glass-br);
            border-radius: 12px;
            padding: 0.65rem 1.15rem;
            color: var(--text-muted);
            font-family: var(--font-body);
            font-size: 0.88rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            transition: all var(--transition);
        }

        .refresh-btn:hover {
            color: var(--accent);
            border-color: var(--accent);
        }

        .refresh-btn.spinning .refresh-icon {
            animation: spin 0.6s linear;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* ── Orders Table ── */
        .orders-table-wrap {
            background: var(--glass);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid var(--glass-br);
            border-radius: var(--radius-lg);
            overflow: hidden;
        }

        .orders-table {
            width: 100%;
            border-collapse: collapse;
        }

        .orders-table thead {
            background: var(--bg-soft);
        }

        .orders-table th {
            text-align: left;
            padding: 1rem 1.25rem;
            font-size: 0.78rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            color: var(--text-muted);
            border-bottom: 1px solid var(--glass-br);
            white-space: nowrap;
        }

        .orders-table td {
            padding: 1rem 1.25rem;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            vertical-align: top;
            font-size: 0.9rem;
        }

        .orders-table tbody tr {
            transition: background var(--transition);
        }

        .orders-table tbody tr:hover {
            background: rgba(255, 214, 51, 0.04);
        }

        .orders-table tbody tr:last-child td {
            border-bottom: none;
        }

        /* Order Number */
        .order-number {
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 0.88rem;
            color: var(--accent);
        }

        /* Customer Cell */
        .customer-cell {
            display: flex;
            flex-direction: column;
            gap: 0.15rem;
        }

        .customer-name {
            font-weight: 700;
            color: var(--text-title);
        }

        .customer-phone {
            font-size: 0.82rem;
            color: var(--text-muted);
        }

        /* Items Cell */
        .items-list {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }

        .item-row {
            font-size: 0.85rem;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 0.35rem;
        }

        .item-qty {
            background: var(--accent-light);
            color: var(--accent);
            font-weight: 700;
            font-size: 0.72rem;
            padding: 0.1rem 0.45rem;
            border-radius: 6px;
            flex-shrink: 0;
        }

        .item-size {
            color: var(--text-muted);
            font-size: 0.78rem;
        }

        /* Amount */
        .order-amount {
            font-family: var(--font-display);
            font-weight: 800;
            font-size: 1rem;
            color: var(--text-title);
            white-space: nowrap;
        }

        /* Address Cell */
        .address-cell {
            font-size: 0.84rem;
            color: var(--text-muted);
            max-width: 220px;
            line-height: 1.5;
        }

        .address-cell .area-tag {
            display: inline-block;
            margin-top: 0.25rem;
            background: var(--accent-light);
            color: var(--accent);
            font-size: 0.72rem;
            font-weight: 700;
            padding: 0.15rem 0.55rem;
            border-radius: 6px;
        }

        .order-note {
            margin-top: 0.35rem;
            font-size: 0.78rem;
            color: var(--warning);
            font-style: italic;
        }

        /* Status Badge */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            font-size: 0.78rem;
            font-weight: 800;
            padding: 0.35rem 0.85rem;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        .status-badge.pending {
            background: rgba(245,158,11,.12);
            color: #F59E0B;
            border: 1px solid rgba(245,158,11,.25);
        }

        .status-badge.confirmed {
            background: rgba(59,130,246,.12);
            color: #3B82F6;
            border: 1px solid rgba(59,130,246,.25);
        }

        .status-badge.delivered {
            background: rgba(16,185,129,.12);
            color: #10B981;
            border: 1px solid rgba(16,185,129,.25);
        }

        .status-badge.cancelled {
            background: rgba(239,68,68,.12);
            color: #EF4444;
            border: 1px solid rgba(239,68,68,.25);
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: currentColor;
        }

        /* Status Dropdown */
        .status-select {
            margin-top: 0.5rem;
            background: var(--bg-soft);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-main);
            font-family: var(--font-body);
            font-size: 0.78rem;
            padding: 0.35rem 0.5rem;
            cursor: pointer;
            outline: none;
            width: 100%;
            transition: border-color var(--transition);
        }

        .status-select:focus { border-color: var(--accent); }

        .status-select option {
            background: var(--bg-soft);
            color: var(--text-main);
        }

        /* Date Cell */
        .order-date {
            font-size: 0.84rem;
            color: var(--text-main);
            white-space: nowrap;
        }

        .order-time {
            font-size: 0.76rem;
            color: var(--text-muted);
        }

        /* Delete Button */
        .delete-btn {
            background: rgba(239,68,68,.1);
            border: 1px solid rgba(239,68,68,.2);
            color: #EF4444;
            padding: 0.4rem 0.7rem;
            border-radius: 8px;
            font-size: 0.82rem;
            cursor: pointer;
            transition: all var(--transition);
        }

        .delete-btn:hover {
            background: rgba(239,68,68,.2);
            border-color: rgba(239,68,68,.4);
        }

        /* ── Empty State ── */
        .empty-state {
            text-align: center;
            padding: 5rem 2rem;
        }

        .empty-state-icon {
            font-size: 3.5rem;
            margin-bottom: 1.25rem;
            opacity: 0.5;
        }

        .empty-state h3 {
            font-family: var(--font-display);
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--text-title);
            margin-bottom: 0.5rem;
        }

        .empty-state p {
            color: var(--text-muted);
            font-size: 0.95rem;
            max-width: 360px;
            margin: 0 auto;
        }

        /* ── Loading Spinner ── */
        .loading-wrap {
            text-align: center;
            padding: 5rem 2rem;
        }

        .loading-spinner {
            width: 44px;
            height: 44px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 1.25rem;
        }

        .loading-wrap p {
            color: var(--text-muted);
            font-weight: 600;
        }

        /* ── Toast Notification ── */
        .admin-toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--bg-soft);
            border: 1px solid var(--glass-br);
            border-radius: 14px;
            padding: 1rem 1.5rem;
            color: var(--text-main);
            font-weight: 600;
            font-size: 0.9rem;
            box-shadow: var(--shadow-lg);
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.35s cubic-bezier(.4,0,.2,1);
            z-index: 500;
        }

        .admin-toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        /* ── Order Detail Expand ── */
        .order-expand {
            display: none;
        }

        .order-expand.active {
            display: table-row;
        }

        .order-expand td {
            padding: 0 1.25rem 1.25rem;
            background: rgba(255,214,51,0.02);
        }

        .expand-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            padding: 1rem;
            background: var(--bg-soft);
            border-radius: var(--radius);
            border: 1px solid var(--border);
        }

        .expand-section h4 {
            font-size: 0.78rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        .expand-section p {
            font-size: 0.88rem;
            color: var(--text-main);
            line-height: 1.6;
        }

        /* ── Responsive ── */
        @media (max-width: 1100px) {
            .stats-row { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 768px) {
            .admin-main { padding: 1rem; }
            .stats-row { grid-template-columns: 1fr; }

            .admin-toolbar {
                flex-direction: column;
                align-items: stretch;
            }

            .toolbar-actions {
                flex-wrap: wrap;
            }

            .admin-search input { width: 100%; }

            .orders-table-wrap { overflow-x: auto; }
            .orders-table { min-width: 900px; }

            .admin-header-inner {
                flex-wrap: wrap;
                gap: 0.75rem;
            }
        }

        @media (max-width: 480px) {
            .admin-header { padding: 0.75rem 1rem; }
            .admin-logo h1 { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

    <!-- Admin Header -->
    <header class="admin-header">
        <div class="admin-header-inner">
            <div class="admin-logo">
                <div class="admin-logo-icon">BB</div>
                <h1>Black <span>Bird</span></h1>
            </div>
            <div class="admin-header-actions">
                <span class="admin-badge">🔒 Admin Panel</span>
                <a href="index.html" class="back-link">← Back to Store</a>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="admin-main">

        <!-- Stats Row -->
        <section class="stats-row">
            <div class="stat-card">
                <div class="stat-card-label">
                    <span class="stat-icon orders">📦</span>
                    Total Orders
                </div>
                <div class="stat-card-value" id="stat-total">—</div>
                <div class="stat-card-sub">All time</div>
            </div>
            <div class="stat-card">
                <div class="stat-card-label">
                    <span class="stat-icon pending">⏳</span>
                    Pending
                </div>
                <div class="stat-card-value" id="stat-pending">—</div>
                <div class="stat-card-sub">Awaiting action</div>
            </div>
            <div class="stat-card">
                <div class="stat-card-label">
                    <span class="stat-icon confirmed">✅</span>
                    Delivered
                </div>
                <div class="stat-card-value" id="stat-delivered">—</div>
                <div class="stat-card-sub">Successfully completed</div>
            </div>
            <div class="stat-card">
                <div class="stat-card-label">
                    <span class="stat-icon revenue">💰</span>
                    Revenue
                </div>
                <div class="stat-card-value" id="stat-revenue">—</div>
                <div class="stat-card-sub">From delivered orders</div>
            </div>
        </section>

        <!-- Toolbar -->
        <div class="admin-toolbar">
            <h2>📋 All Orders</h2>
            <div class="toolbar-actions">
                <div class="admin-search">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="admin-search" placeholder="Search by name, phone, order #...">
                </div>
                <select class="filter-select" id="status-filter">
                    <option value="all">All Statuses</option>
                    <option value="pending">Pending</option>
                    <option value="confirmed">Confirmed</option>
                    <option value="delivered">Delivered</option>
                    <option value="cancelled">Cancelled</option>
                </select>
                <button class="refresh-btn" id="refresh-btn" onclick="loadOrders()">
                    <span class="refresh-icon">🔄</span> Refresh
                </button>
            </div>
        </div>

        <!-- Orders Table -->
        <div class="orders-table-wrap">
            <div id="orders-container">
                <!-- Loading state -->
                <div class="loading-wrap" id="loading-state">
                    <div class="loading-spinner"></div>
                    <p>Loading orders from Firebase…</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Toast -->
    <div class="admin-toast" id="admin-toast"></div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="admin.js"></script>
</body>
</html>
